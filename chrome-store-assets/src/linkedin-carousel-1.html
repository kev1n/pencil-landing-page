<!doctype html>
<html lang="en"><head><meta charset="UTF-8" />
<title>pencil.nu — LinkedIn carousel · 1 / 8</title>
<link rel="stylesheet" href="common.css" />
<style>
  html, body { width: 1080px; height: 1350px; margin: 0; padding: 0; overflow: hidden; }
  .canvas { width: 1080px; height: 1350px; position: relative; }

  .canvas::before {
    background-image:
      linear-gradient(rgba(38,30,20,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(38,30,20,0.09) 1px, transparent 1px) !important;
  }
  .canvas::after { opacity: 0.65 !important; }

  .inner {
    width: 1080px;
    height: 1350px;
    padding: 64px 72px 80px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 36px;
    box-sizing: border-box;
  }
  .main { min-height: 0; display: grid; align-content: space-between; justify-items: start; }
  .footer { align-self: end; }

  .tag {
    font-family: var(--font-hand);
    color: var(--accent);
    transform: rotate(-1.5deg);
    display: inline-block;
    font-size: 40px;
    line-height: 1;
    margin-bottom: 22px;
  }

  .title {
    font-family: var(--font-pencil);
    font-size: 116px;
    line-height: 1.0;
    letter-spacing: -0.045em;
    color: var(--ink);
    max-width: 12ch;
    margin-bottom: 0;
  }
  .title em { font-style: italic; color: var(--accent); }
  .title .marker {
    background: linear-gradient(transparent 56%, rgba(245, 200, 66, 0.78) 56%);
    padding: 0 10px;
  }

  .sub-wrap {
    margin-top: 44px;
    display: flex;
    align-items: center;
    gap: 22px;
    position: relative;
  }
  .subhead {
    font-family: var(--font-body);
    font-size: 26px;
    color: var(--ink-2);
    line-height: 1.4;
    font-weight: 500;
  }
  .free-pill-big {
    display: inline-block;
    font-family: var(--font-hand);
    font-size: 38px;
    color: var(--accent);
    background: var(--paper);
    border: 2px solid var(--accent);
    border-radius: 999px;
    padding: 2px 22px 6px;
    transform: rotate(6deg);
    box-shadow: 2px 2px 0 var(--accent);
    line-height: 1;
  }

  .plane {
    position: absolute;
    top: 70px;
    right: 70px;
    transform: rotate(-12deg);
    filter: drop-shadow(5px 6px 0 rgba(229, 122, 144, 0.40));
    z-index: 2;
  }

  .arrow-doodle {
    position: absolute;
    top: 360px;
    left: 60px;
    z-index: 2;
    pointer-events: none;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .page-num {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--ink-3);
    letter-spacing: 0.16em;
  }
  .brand {
    font-family: var(--font-pencil);
    font-size: 32px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: -0.01em;
  }
  .brand svg { display: block; }
</style></head>
<body>
<div class="canvas"><div class="inner">

  <svg class="plane" width="160" height="160" viewBox="0 0 100 100" fill="none" aria-hidden="true">
    <path d="M14 44 L88 18 L70 84 L46 60 L36 68 L36 52 L70 28 L42 52 Z"
          stroke="#2a2a2e" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none" />
  </svg>

  <div class="tag">— for shopping week —</div>

  <div class="main">
    <h1 class="title">We <span class="marker">rebuilt</span> Northwestern's <em>course&nbsp;search.</em></h1>

    <svg class="arrow-doodle" width="220" height="160" viewBox="0 0 220 160" fill="none" aria-hidden="true">
      <path d="M14 130 C 40 90, 80 60, 130 42"
            stroke="#e57a90" stroke-width="3.2" stroke-linecap="round" fill="none"
            stroke-dasharray="0" />
      <path d="M118 36 L132 42 L122 54"
            stroke="#e57a90" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M16 132 C 18 124, 22 122, 28 124"
            stroke="#e57a90" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.7" />
    </svg>

    <div class="sub-wrap">
      <p class="subhead">A free Chrome extension.<br />By NU students.</p>
      <span class="free-pill-big">free!</span>
    </div>
  </div>

  <div class="footer">
    <div class="page-num">1 / 8</div>
    <div class="brand">
      <svg width="18" height="40" viewBox="14 6 14 30" fill="none" aria-hidden="true">
        <g transform="rotate(90 21 21)" stroke="#2a2a2e" stroke-width="1.2" stroke-linejoin="round">
          <rect x="2" y="16" width="6" height="10" rx="1.6" fill="#ef8da6" />
          <rect x="8" y="16" width="5" height="10" fill="#c2c7cb" />
          <line x1="9.7" y1="16.4" x2="9.7" y2="25.6" stroke="#7d848a" stroke-width="0.55" />
          <line x1="11.3" y1="16.4" x2="11.3" y2="25.6" stroke="#7d848a" stroke-width="0.55" />
          <rect x="13" y="16" width="17" height="10" fill="#f5c842" />
          <polygon points="30,16 35,16 35,26 30,26" fill="#d4a373" />
          <polygon points="35,16 40,21 35,26" fill="#2a2a2e" />
        </g>
      </svg>
      pencil.nu
    </div>
  </div>

</div></div>
</body></html>
